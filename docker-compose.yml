services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ytapp
      POSTGRES_PASSWORD: ytapp
      POSTGRES_DB: ytapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytapp -d ytapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
