server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backend upstream host:port — override at runtime if needed.
    # Defaults assume the API container is reachable as "backend:8000".
    resolver 127.0.0.11 valid=30s;

    # Proxy API calls to the FastAPI backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (/api/transcribe streams progress) — disable
        # buffering and keep the connection open long enough for transcription.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
